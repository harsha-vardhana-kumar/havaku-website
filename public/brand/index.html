  <style>
    :root {
      --ivory: #FAF7F2;
      --gold: #C9A96E;
      --blush: #F2D6CF;
      --taupe: #7D6B5E;
      --soft-black: #1A1A1A;
      --warm-white: #FFFDF9;
      --rose-gold: #B76E79;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--ivory);
      color: var(--soft-black);
      -webkit-font-smoothing: antialiased;
      padding: 40px;
    }
    .kit-container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.05); }
    
    section { padding: 60px 40px; border-bottom: 1px solid rgba(201,169,110,0.15); }
    .dark-sec { background: var(--soft-black); color: var(--warm-white); }
    
    .sec-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 30px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
    .card { background: rgba(201,169,110,0.03); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; transition: transform 0.3s ease; }
    .card:hover { transform: translateY(-5px); }
    .card img { max-width: 100%; height: auto; }
    
    .dl-link { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); text-decoration: none; border: 1px solid rgba(201,169,110,0.3); padding: 8px 16px; border-radius: 4px; }
    .dl-link:hover { background: var(--gold); color: white; }

    .favicon-grid { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
    .favicon-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .favicon-item span { font-size: 10px; opacity: 0.6; }

    .color-grid { display: flex; gap: 15px; flex-wrap: wrap; }
    .swatch { width: 80px; text-align: center; }
    .swatch-box { width: 80px; height: 80px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
    .swatch-name { font-size: 10px; font-weight: 600; }
  </style>

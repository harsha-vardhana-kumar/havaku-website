<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; padding: 0; background: transparent; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .favicon-96 { width: 96px; height: 96px; border-radius: 12px; }
    .logo-full { width: 800px; height: 400px; }
  </style>
</head>
<body>
  <!-- 96px icon for favicon -->
  <div id="capture-favicon">
    <svg width="96" height="96" viewBox="0 0 96 96">
      <rect width="96" height="96" rx="12" fill="#1A1A1A"/>
      <g transform="translate(48, 48)">
        <circle cx="0" cy="0" r="15" fill="none" stroke="#C9A96E" stroke-width="1.2"/>
        <circle cx="0" cy="0" r="6" fill="#C9A96E" opacity="0.8"/>
        <ellipse cx="0" cy="-27" rx="4.5" ry="12" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.55"/>
        <ellipse cx="0" cy="27" rx="4.5" ry="12" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.55"/>
        <ellipse cx="-27" cy="0" rx="12" ry="4.5" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.55"/>
        <ellipse cx="27" cy="0" rx="12" ry="4.5" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.55"/>
        <ellipse cx="-20" cy="-20" rx="6" ry="10" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="0.36" transform="rotate(-45,-20,-20)"/>
        <ellipse cx="20" cy="-20" rx="6" ry="10" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="0.36" transform="rotate(45,20,-20)"/>
        <ellipse cx="-20" cy="20" rx="6" ry="10" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="0.36" transform="rotate(45,-20,20)"/>
        <ellipse cx="20" cy="20" rx="6" ry="10" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="0.36" transform="rotate(-45,20,20)"/>
      </g>
    </svg>
  </div>

  <!-- Full logo for social share -->
  <div id="capture-logo">
    <svg width="800" height="400" viewBox="0 0 800 400">
      <rect width="800" height="400" fill="#1A1A1A"/>
      <g transform="translate(400, 200)">
        <text x="0" y="0" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="120" font-weight="300" font-style="italic" letter-spacing="0.12em" fill="#FAF7F2">
          H<tspan fill="#C9A96E">A</tspan>V<tspan fill="#C9A96E">A</tspan>KU
        </text>
        <line x1="-150" y1="20" x2="150" y2="20" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
        <text x="0" y="50" text-anchor="middle" font-family="'Manrope', sans-serif" font-size="20" font-weight="200" letter-spacing="0.55em" fill="#C9A96E" opacity="0.7">BEAUTY &amp; BRIDAL</text>
      </g>
    </svg>
  </div>
</body>
</html>
